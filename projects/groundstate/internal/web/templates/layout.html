{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Groundstate — PQC Compliance Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f9f9f8;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 0 24px 48px; }

    /* Header */
    header {
      padding: 24px 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e5e5e5;
      margin-bottom: 32px;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .logo-mark {
      width: 24px; height: 24px;
      background: #1a1a1a;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .header-frameworks {
      display: flex; gap: 12px;
    }
    .header-frameworks span {
      font-size: 11px;
      font-family: monospace;
      color: #bbb;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      font-family: monospace;
      letter-spacing: 0.3px;
    }
    .badge-red    { background: #fff0f0; color: #c0392b; }
    .badge-yellow { background: #fffbf0; color: #b7770d; }
    .badge-green  { background: #f0fff4; color: #1e8449; }

    /* Severity */
    .sev-critical { color: #c0392b; font-weight: 700; }
    .sev-high     { color: #e67e22; font-weight: 600; }
    .sev-medium   { color: #b7770d; }
    .sev-low      { color: #888; }

    /* Repo cards */
    .repo-list { display: flex; flex-direction: column; gap: 1px; background: #e5e5e5; border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; }
    .repo-row {
      background: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .repo-row:hover { background: #fafaf9; }
    .repo-name { font-weight: 500; font-size: 14px; }
    .repo-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .compliance-grid { display: flex; gap: 6px; }
    .trend { font-size: 12px; color: #888; margin-left: 8px; }

    /* Findings table */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 12px;
      border-bottom: 1px solid #e5e5e5;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    .file-path { font-family: monospace; font-size: 12px; }
    .line-num  { font-family: monospace; font-size: 12px; color: #888; }
    .snippet {
      font-family: monospace;
      font-size: 11px;
      background: #f6f6f5;
      border-radius: 4px;
      padding: 8px 10px;
      margin-top: 6px;
      white-space: pre-wrap;
      max-width: 480px;
    }
    .migration {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
    }

    /* Section headers */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 12px;
    }
    .section-title { font-size: 16px; font-weight: 600; }
    .section-count { font-size: 13px; color: #888; }

    /* Empty state */
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: #888;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
    }

    /* Stat row */
    .stats { display: flex; gap: 24px; margin-bottom: 32px; }
    .stat { }
    .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
    .stat-label { font-size: 12px; color: #888; margin-top: 2px; }
    .stat-value.red { color: #c0392b; }
    .stat-value.yellow { color: #b7770d; }

    /* Breadcrumb */
    .breadcrumb { font-size: 13px; color: #888; margin-bottom: 24px; }
    .breadcrumb a:hover { color: #1a1a1a; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="/" class="logo">
      <div class="logo-mark">GS</div>
      <span class="logo-name">Groundstate</span>
    </a>
    <div class="header-frameworks">
      <span>NIS2</span>
      <span>DORA</span>
      <span>FIPS 203</span>
      <span>FIPS 204</span>
    </div>
  </header>
  {{template "content" .}}
</div>
</body>
</html>{{end}}
